services:
  - type: web
    name: shiftsync-backend
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm prisma generate && pnpm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shiftsync-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 7d
      - key: FRONTEND_URL
        value: https://shift-sync-three.vercel.app
      - key: PORT
        value: 10000

databases:
  - name: shiftsync-db
    databaseName: shiftsync
    user: shiftsync
    plan: free
